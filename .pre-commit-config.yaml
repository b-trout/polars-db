---
repos:
  - repo: local
    hooks:
      - id: format
        name: ruff format
        entry: uv run poe format
        language: system
        types: [python]
        pass_filenames: false
      - id: lint
        name: ruff lint
        entry: uv run poe lint-fix
        language: system
        types: [python]
        pass_filenames: false
      - id: type-check
        name: ty type check
        entry: uv run poe type-check
        language: system
        types: [python]
        pass_filenames: false
      - id: yaml-format
        name: yamlfix
        entry: uv run poe yaml-format
        language: system
        types: [yaml]
        pass_filenames: false
      - id: yaml-lint
        name: yamllint
        entry: uv run poe yaml-lint
        language: system
        types: [yaml]
        pass_filenames: false
      - id: docker-lint
        name: hadolint
        entry: uv run poe docker-lint
        language: system
        files: Dockerfile
        pass_filenames: false
