---
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: testdb
    ports: [5432:5432]
    tmpfs: /var/lib/postgresql/data
    healthcheck:
      test: [CMD-SHELL, pg_isready -U test -d testdb]
      interval: 5s
      timeout: 3s
      retries: 10
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: test
      MYSQL_DATABASE: testdb
    ports: [3306:3306]
    tmpfs: /var/lib/mysql
    healthcheck:
      test: [CMD, mysqladmin, ping, -h, localhost, -u, root, -ptest]
      interval: 5s
      timeout: 3s
      retries: 10
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: Y
      MSSQL_SA_PASSWORD: Test@12345
    ports: [1433:1433]
    healthcheck:
      test: [CMD-SHELL, /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Test@12345' -Q 'SELECT 1' -C -b]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
  bigquery:
    image: ghcr.io/goccy/bigquery-emulator:latest
    command: --project=test-project --dataset=test_dataset
    ports: [9050:9050]
    healthcheck:
      test: [CMD-SHELL, curl -sf http://localhost:9050/ || exit 1]
      interval: 5s
      timeout: 3s
      retries: 10
